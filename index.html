<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Painter</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif;}
        #webcam { display: none; /* Hide the raw video, we will pipe it into Three.js */ }
        #toolbar {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 15px; border-radius: 8px;
            color: white; backdrop-filter: blur(5px);
            display: flex; flex-direction: column; gap: 10px;
        }
        .control_group {display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        button { padding: 6px 6px; cursor: pointer; backdrop-filter: #2b2b2b; color: rgb(78, 78, 78); border: 1px solid #555; border-radius: 5px; }
        button:hover { background: #d0d0d0; }
        #exportBtn {background: #4cad4b; color: black; font-weight: bold; }
        #exportBtn:hover { background: #10c14e; }

        #ui { position: absolute; color: white; top: 20px; left: 20px; text-shadow: 1px 1px 2px black; 
            pointer-events: none; display: flex; align-items: center; gap: 18px;}
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0;">3D Paint!!</h2>
        <div id="loading" style="color:#ffb92d;">Starting up...</div>
    </div>

    <div class="control_group">
        <label>Color:</label>
        <input type="color" id="colorPicker" value="#00ffcc">
    </div>

    <div class="control_group">
        <label>Brush size:</label>
        <input type="range" id="sizeSlider" min="0.1" max="1.5" step="0.1" value="0.4">
    </div>
    
    <div class="control-group">
            <button id="clearBtn"><u>C</u>lear Canvas</button>
            <button id="exportBtn"><u>E</u>xport 3D Drawing to gLTF</button>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";
        //TODO: add clear canvas, change brush size, change color, 3d export, fist to rotate
        //three.js setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        //Lighting setup
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(0, 5, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        //Parent group to hold drawing
        const drawingGroup = new THREE.Group();
        scene.add(drawingGroup);

        //Finger pointer
        const cursorGeometry = new THREE.SphereGeometry(0.2, 16, 16);
        const cursorMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const cursorMesh = new THREE.Mesh(cursorGeometry, cursorMaterial);
        scene.add(cursorMesh);

        //setup (inverted) webcam
        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: { width: 1920, height: 1080 } }).then((stream) => {
            video.srcObject = stream;
            video.play();
            
            //put webcam feed as background
            const videoTexture = new THREE.VideoTexture(video);
            videoTexture.colorSpace = THREE.SRGBColorSpace;
            
            //mirror
            videoTexture.wrapS = THREE.RepeatWrapping;
            videoTexture.repeat.x = -1; 
            
            scene.background = videoTexture;
        });

        //Trackers
        let currentPoints = [];
        let currentLineMesh = null;
        let isDrawing = false;
        //for straight line feature
        let lastMoveTime = 0;
        let snapped = false;
        let fistTime = 0;
        let holdingFist = false;
        let drawTime = 0;

        let currentBrushSize = parseFloat(document.getElementById('sizeSlider').value);
        const randomColor = Math.random() * 0xffffff;
        const brushMaterial = new THREE.MeshStandardMaterial({ color: randomColor, roughness: 0.5 });

        document.getElementById('colorPicker').addEventListener('input', (e) => {
            brushMaterial.color.set(e.target.value);
        });
        document.getElementById('clearBtn').addEventListener('click', () => {
            while (drawingGroup.children.length > 0){
                const mesh = drawingGroup.children[0];
                drawingGroup.remove(mesh);
                mesh.geometry.dispose();
            }
            drawingGroup.rotation.set(0,0,0);
        });
        document.getElementById('sizeSlider').addEventListener('input', (e) => {
            currentBrushSize = parseFloat(e.target.value);
        });
        document.getElementById('exportBtn').addEventListener('click', () => {
            const exporter = new GLTFExporter();
            exporter.parse(drawingGroup, (gltf) => {
                const blob = new Blob([gltf], { type: 'application/octet-stream' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "drawing.glb";
                link.click()
            }, (error) => { console.error('Export failed:', error); }, {binary: true});
        });

        window.addEventListener('keydown', (event) => {
            if (event.key.toLowerCase() === 'c'){
                document.getElementById('clearBtn').click();
            }
            if (event.key.toLowerCase() === 'e'){
                document.getElementById('exportBtn').click();
            }
        })


        //Math Helper: Map a number from one range to another (like np.interp)
        function mapRange(val, inMin, inMax, outMin, outMax) {
            const mapped = (val - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
            return Math.max(Math.min(mapped, Math.max(outMin, outMax)), Math.min(outMin, outMax)); // clamp
        }

        //Mediapipe initialization
        let handLandmarker;
        async function initializeAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            document.getElementById('loading').style.color = "#00ff00";
            document.getElementById('loading').innerText = "Paint with index finger, hold up middle finger to stop painting, and hold a fist to rotate. Keep hand in frame";
            renderLoop(); 
        }
        initializeAI();

        //drawing loop
        let lastVideoTime = -1;
        let isGrabbing = false;
        let lastGrabPos = new THREE.Vector2();

        function renderLoop() {
            requestAnimationFrame(renderLoop);

            //Process tracking when webcam updates
            if (video.currentTime !== lastVideoTime && handLandmarker && video.readyState >= 2 && video.videoWidth > 0) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());

                if (results.landmarks.length > 0) {
                    const lm = results.landmarks[0]; 

                    //Calculate Depth (Distance between knuckle 5 and 17)
                    const dx = lm[17].x - lm[5].x;
                    const dy = lm[17].y - lm[5].y;
                    const rawDepth = Math.sqrt(dx * dx + dy * dy); 
                    
                    //Map raw depth (approx 0.05 to 0.3) to Z space (40 to 10)
                    const world_z = mapRange(rawDepth, 0.05, 0.3, 50, 10);

                    //3D math
                    const fov_radians = (camera.fov / 2) * (Math.PI / 180);
                    const visible_h = world_z * Math.tan(fov_radians) * 2;
                    const visible_w = visible_h * camera.aspect;

                    //flip x to account for inverse webcam
                    const world_x = -((lm[8].x) - 0.5) * visible_w;
                    const world_y = -((lm[8].y) - 0.5) * visible_h;

                    const currentPos = new THREE.Vector3(world_x, world_y, -world_z);

                    // Force the red cursor to always follow our calculated position
                    cursorMesh.position.copy(currentPos);

                    // Index Up: Tip (8) is higher than the base knuckle (5)
                    const indexUp = lm[8].y < lm[5].y; 
                    //Middle Down: Tip (12) is lower than the middle joint (10)
                    const middleDown = lm[12].y > lm[10].y; 
                    const drawingGesture = indexUp && middleDown
                    //fist (for rotation)
                    const indexCurl = lm[8].y > lm[5].y;
                    const ringCurl = lm[16].y > lm[13].y;
                    const pinkyCurl = lm[20].y > lm[17].y;
                    const isFist = indexCurl && middleDown && ringCurl && pinkyCurl;

                    if (drawingGesture && !isFist) {
                        isGrabbing = false;
                        holdingFist = false;
                        if (!snapped) cursorMesh.material.color.setHex(0x00ff00);
                        const localPos = drawingGroup.worldToLocal(currentPos.clone());

                        if (!isDrawing) {
                            // Start a new line
                            isDrawing = true;
                            currentPoints = [localPos];
                            cursorMesh.material.color.setHex(randomColor);
                            lastMoveTime = performance.now()
                            snapped = false;
                        } 
                        else {
                            if (snapped){
                                currentPoints = [currentPoints[0], localPos];
                                updateSplineMesh();
                            }
                            else {
                                const lastPoint = currentPoints[currentPoints.length - 1];
                                const dist = localPos.distanceTo(lastPoint);
                                //Only add a point if we moved enough to prevent it getting messy
                            
                                if (dist > 0.23) {
                                    currentPoints.push(localPos);
                                    updateSplineMesh();
                                    lastMoveTime = performance.now()
                                }
                                else{
                                    if (performance.now() - lastMoveTime > 500){
                                        currentPoints = [currentPoints[0], localPos];
                                        updateSplineMesh();
                                        snapped = true;
                                        cursorMesh.material.color.setHex(0xffffff);
                                    }
                                }
                            }
                        }
                        //calculate roation from 6 and 18 
                    } 
                    else if (isFist) {
                        isDrawing = false;
                        currentLineMesh = null;
                        
                        if (!holdingFist) {
                            holdingFist = true;
                            fistTime = performance.now();
                            cursorMesh.material.color.setHex(0xffaa00);
                            isGrabbing = false;
                        }
                        else {
                            if (performance.now() - fistTime > 1200) {
                                cursorMesh.material.color.setHex(0xffffff);

                                if (!isGrabbing) {
                                    isGrabbing = true;
                                    lastGrabPos.set(lm[8].x, lm[8].y);

                                    if (drawingGroup.children.length > 0) {
                                        // Make a bounding box
                                        const box = new THREE.Box3().setFromObject(drawingGroup);
                                        const worldCenter = new THREE.Vector3();
                                        box.getCenter(worldCenter);
                                        
                                        // Find where world center is in group
                                        const localCenter = drawingGroup.worldToLocal(worldCenter.clone());
                                        
                                        // Shift strokes slightly back
                                        for (let child of drawingGroup.children) {
                                            child.position.sub(localCenter);
                                        }
                                        drawingGroup.position.copy(worldCenter);
                                    }
                                }
                                else { 
                                    // Find how far hand moved on screen
                                    const movX = lm[8].x - lastGrabPos.x;
                                    const movY = lm[8].y - lastGrabPos.y;
                                    
                                    // Apply movement to rotation (change for sensitivity)
                                    drawingGroup.rotation.y += movX * -6;
                                    drawingGroup.rotation.x += movY * 6;

                                    lastGrabPos.set(lm[8].x, lm[8].y);
                                }
                            }
                            else {
                                cursorMesh.material.color.setHex(0xffaa00);
                            }
                        }
                    }
                    else {
                        isGrabbing = false;
                        holdingFist = false;
                        
                        // Stop drawing
                        if (isDrawing) {
                            isDrawing = false;
                            currentLineMesh = null; // Detach from current mesh, ready for a new one
                        }
                        cursorMesh.material.color.setHex(0xff0000); // Red cursor when paused
                    }
                }
            }

            //Render the 3D scene
            renderer.render(scene, camera);
        }

        // spline generation
        function updateSplineMesh() {
            //at least 2 points to draw a curve
            if (currentPoints.length < 2) return;

            //ts is the WHOLE reason for switching to three.js
            const curve = new THREE.CatmullRomCurve3(currentPoints);
            
            //generate the 3D Tube along the path
            const geometry = new THREE.TubeGeometry(curve, currentPoints.length * 2, currentBrushSize, 8, false);

            if (!currentLineMesh) {
                // If this is the start of a stroke, create the Mesh and add it
                currentLineMesh = new THREE.Mesh(geometry, brushMaterial);
                drawingGroup.add(currentLineMesh);
            } else {
                //If continuing a stroke, swap out the old geometry for the new longer one
                currentLineMesh.geometry.dispose();//clear memory
                currentLineMesh.geometry = geometry;
            }
        }

        //window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
